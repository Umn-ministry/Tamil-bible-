<!DOCTYPE html>
<html lang="ta">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>அதிகாரங்கள்</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{

background:#1565c0;

color:white;

padding:20px;

text-align:center;

}

#chapters{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(80px,1fr));

gap:15px;

padding:20px;

}

.chapter{

background:white;

padding:20px;

text-align:center;

border-radius:10px;

cursor:pointer;

font-size:20px;

font-weight:bold;

box-shadow:0 2px 8px rgba(0,0,0,.2);

transition:.3s;

}

.chapter:hover{

background:#1565c0;

color:white;

}

</style>

</head>

<body>

<header>

<h2 id="title"></h2>

</header>

<div id="chapters"></div>

<script>

const params=new URLSearchParams(location.search);

const file=params.get("book");

document.getElementById("title").innerHTML=file;

fetch("books/"+file+".json")

.then(r=>r.json())

.then(book=>{

let html="";

for(let i=0;i<book.Chapter.length;i++){

html+=`
<div class="chapter"
onclick="openChapter(${i+1})">

${i+1}

</div>
`;

}

document.getElementById("chapters").innerHTML=html;

});

function openChapter(ch){

location.href="chapter.html?book="+file+"&chapter="+ch;

}

</script>

</body>
</html>
