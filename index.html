<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>தமிழ் வேதாகமம்</title>

<style>

:root{
--fontSize:18px;
}

body{
font-family:Arial,sans-serif;
margin:0; 
background:#f5f5f5;
font-size:var(--fontSize);
transition:.3s;
}

body.dark{
background:#121212;
color:#fff;
}

header{
background:#0d47a1;
color:#fff;
padding:20px;
text-align:center;
}

.toolbar{
margin-top:15px;
display:flex;
justify-content:center;
gap:10px;
}

.toolbar button{
padding:8px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:18px;
font-weight:bold;
}

#books{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.book{
background:#fff;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,.2);
transition:.3s;
}

.book:hover{
background:#1565c0;
color:#fff;
}

body.dark .book{
background:#1f1f1f;
color:#fff;
}

</style>

</head>

<body>

<header>

<h1>📖 தமிழ் வேதாகமம்</h1>

<div class="toolbar">

<button onclick="toggleDarkMode()">🌙</button>

<button onclick="increaseFont()">A+</button>

<button onclick="decreaseFont()">A-</button>

</div>

</header>

<div id="books"></div>

<script>

const books=[
"ஆதியாகமம்","யாத்திராகமம்","லேவியராகமம்","எண்ணாகமம்","உபாகமம்",
"யோசுவா","நியாயாதிபதிகள்","ரூத்","1 சாமுவேல்","2 சாமுவேல்",
"1 இராஜாக்கள்","2 இராஜாக்கள்","1 நாளாகமம்","2 நாளாகமம்",
"எஸ்றா","நெகேமியா","எஸ்தர்","யோபு","சங்கீதம்","நீதிமொழிகள்",
"பிரசங்கி","உன்னதப்பாட்டு","ஏசாயா","எரேமியா","புலம்பல்",
"எசேக்கியேல்","தானியேல்","ஓசியா","யோவேல்","ஆமோஸ்",
"ஒபதியா","யோனா","மீகா","நாகூம்","ஆபகூக்","செப்பனியா",
"ஆகாய்","சகரியா","மல்கியா","மத்தேயு","மாற்கு","லூக்கா",
"யோவான்","அப்போஸ்தலர்","ரோமர்","1 கொரிந்தியர்",
"2 கொரிந்தியர்","கலாத்தியர்","எபேசியர்","பிலிப்பியர்",
"கொலோசெயர்","1 தெசலோனிக்கேயர்","2 தெசலோனிக்கேயர்",
"1 தீமோத்தேயு","2 தீமோத்தேயு","தீத்து","பிலேமோன்",
"எபிரெயர்","யாக்கோபு","1 பேதுரு","2 பேதுரு",
"1 யோவான்","2 யோவான்","3 யோவான்","யூதா",
"வெளிப்படுத்தின விசேஷம்"
];

let html="";

books.forEach((book,i)=>{
html += `<div class="book" onclick="openBook(${i})">${book}</div>`;
});

document.getElementById("books").innerHTML=html;

function openBook(index){
window.location.href="reader.html?book="+index;
}

// Dark Mode

function toggleDarkMode(){

document.body.classList.toggle("dark");

localStorage.setItem("theme",
document.body.classList.contains("dark")?"dark":"light");

}

if(localStorage.getItem("theme")=="dark"){

document.body.classList.add("dark");

}

// Font Size

let size=parseInt(localStorage.getItem("font"))||18;

document.documentElement.style.setProperty("--fontSize",size+"px");

function increaseFont(){

size+=2;

localStorage.setItem("font",size);

document.documentElement.style.setProperty("--fontSize",size+"px");

}

function decreaseFont(){

if(size>14){

size-=2;

localStorage.setItem("font",size);

document.documentElement.style.setProperty("--fontSize",size+"px");

}

}

</script>

</body>
</html>
